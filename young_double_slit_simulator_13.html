<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヤングの二重スリット干渉実験</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0a0e1a;--bg2:#0f1526;--bg3:#151d35;
  --panel:#111827;--panel2:#1a2340;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --t:#e8eaf2;--t2:#8892aa;--t3:#4a5570;
  --ac:#4f8ef7;--ac2:#7c5af5;
  --gr:#3dd68c;--am:#f5a623;--rd:#f05b5b;--cy:#29d4d4;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans JP',sans-serif;font-size:13px;display:flex;flex-direction:column;}

/* ── header (compact) ── */
header{
  flex-shrink:0;
  background:linear-gradient(135deg,#0d1428,#0f1d3a);
  border-bottom:1px solid var(--bd2);
  padding:8px 20px;
  display:flex;align-items:center;gap:12px;
  height:46px;
}
.logo{width:28px;height:28px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
header h1{font-size:14px;font-weight:500;letter-spacing:.03em;white-space:nowrap;}
header .sub{font-size:10px;color:var(--t2);margin-top:1px;white-space:nowrap;}
.hbadges{margin-left:auto;display:flex;gap:6px;}
.badge{font-size:10px;padding:2px 8px;background:var(--bg3);border:1px solid var(--bd2);border-radius:20px;color:var(--t2);font-family:'JetBrains Mono',monospace;}

/* ── tabs (compact) ── */
.tab-bar{
  flex-shrink:0;
  display:flex;gap:3px;padding:8px 20px 0;
  border-bottom:1px solid var(--bd);background:var(--bg2);
  height:38px;
}
.tab-btn{padding:6px 16px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;background:transparent;border:none;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;border-radius:5px 5px 0 0;position:relative;bottom:-1px;}
.tab-btn:hover{color:var(--t);background:var(--bg3);}
.tab-btn.active{color:var(--ac);border-bottom-color:var(--ac);background:var(--bg);}
.tab-num{font-size:9px;background:var(--ac);color:#fff;border-radius:10px;padding:1px 5px;margin-right:4px;font-weight:700;}

/* ── tab panels (fill remaining) ── */
.tab-panel{display:none;flex:1;overflow:hidden;}
.tab-panel.active{display:flex;flex-direction:column;}

/* ── main area ── */
.app-body{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  padding:10px 16px 8px;
  gap:8px;
}

/* ── metrics strip ── */
.metrics-row{
  flex-shrink:0;
  display:flex;gap:8px;
}
.mc{
  flex:1;
  background:var(--panel);border:1px solid var(--bd);border-radius:10px;
  padding:7px 12px;position:relative;overflow:hidden;
}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mc.blue::before{background:linear-gradient(90deg,var(--ac),var(--ac2));}
.mc.green::before{background:linear-gradient(90deg,var(--gr),var(--cy));}
.mc.amber::before{background:linear-gradient(90deg,var(--am),#f07b23);}
.mc.red::before{background:linear-gradient(90deg,var(--rd),#f07b23);}
.ml{font-size:10px;color:var(--t2);margin-bottom:2px;}
.mv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;line-height:1.2;}
.mv .u{font-size:10px;color:var(--t2);margin-left:2px;font-weight:400;}
.ms{font-size:10px;color:var(--t3);margin-top:1px;font-family:'JetBrains Mono',monospace;}

/* ── vis area (光路図 + 干渉縞 横並び) ── */
.vis-area{
  flex:1;overflow:hidden;
  display:flex;gap:8px;align-items:stretch;
  min-height:0;
}
.path-card{
  flex:1;min-width:0;
  background:var(--panel);border:1px solid var(--bd);border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;
}
.card-hdr{
  flex-shrink:0;
  padding:6px 12px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:6px;
  background:var(--panel2);font-size:11px;font-weight:500;letter-spacing:.04em;
}
.path-body{flex:1;padding:8px;min-height:0;display:flex;flex-direction:column;gap:6px;}

/* canvas wrapper – fills available height */
.cw{
  position:relative;background:#050810;
  border-radius:8px;overflow:hidden;border:1px solid var(--bd);
}
.cw canvas{display:block;width:100%;}
.clabel{position:absolute;top:6px;left:8px;font-size:9px;color:rgba(255,255,255,0.35);font-family:'JetBrains Mono',monospace;pointer-events:none;}

/* fringe panel (right of path) */
.fringe-panel{
  flex-shrink:0;width:auto;
  background:var(--panel);border:1px solid var(--bd);border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;
}
.fringe-body{flex:1;padding:8px;display:flex;gap:8px;align-items:stretch;min-height:0;}
.fringe-unit{display:flex;flex-direction:column;align-items:center;gap:3px;}
.flabel{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-align:center;white-space:nowrap;}
.fringe-unit .cw{flex:1;}
.fringe-unit .cw canvas{height:100%;display:block;}

/* axis label */
.axis-side{
  display:flex;flex-direction:column;justify-content:space-between;align-items:center;
  padding:4px 0;flex-shrink:0;
}
.axis-side span{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;}
.axis-side .mid{writing-mode:vertical-rl;letter-spacing:2px;font-size:9px;}

/* ── params strip (below vis) ── */
.params-strip{
  flex-shrink:0;
  background:var(--panel);border:1px solid var(--bd);border-radius:10px;
  padding:8px 14px;
}
.sliders-row{
  display:flex;gap:20px;align-items:end;flex-wrap:nowrap;
}
.sg{flex:1;min-width:0;}
.sg-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.sg-name{font-size:11px;color:var(--t2);}
.sg-name em{font-style:normal;color:var(--t);margin-right:2px;}
.sg-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--ac);background:var(--bg3);padding:1px 6px;border-radius:4px;border:1px solid var(--bd2);white-space:nowrap;}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:3px;background:var(--bg3);border-radius:2px;outline:none;border:1px solid var(--bd);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;
  background:var(--ac);border-radius:50%;cursor:pointer;
  border:2px solid var(--bg);box-shadow:0 0 6px rgba(79,142,247,0.5);
}
.tg-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;align-self:center;}
.tg-btn.on{background:rgba(79,142,247,0.15);color:var(--ac);border-color:rgba(79,142,247,0.4);}
</style>
</head>
<body>

<header>
  <div class="logo">🔬</div>
  <div>
    <h1>ヤングの二重スリット干渉実験</h1>
    <div class="sub">Young's Double Slit Interference — 波動光学シミュレーター</div>
  </div>
  <div class="hbadges">
    <span class="badge">λ: 380–780 nm</span>
    <span class="badge">問２</span>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-btn-2" onclick="switchTab(2)"><span class="tab-num">問２</span>ガラス板挿入</button>
</div>

<!-- ══════════ 問２ ══════════ -->
<div id="panel-2" class="tab-panel active">
  <div class="app-body">

    <!-- metrics -->
    <div class="metrics-row">
      <div class="mc blue"><div class="ml">縞間隔 D</div><div class="mv" id="m2-D">—<span class="u">mm</span></div><div class="ms">Lλ / 2d</div></div>
      <div class="mc amber"><div class="ml">追加光路差 Δ</div><div class="mv" id="m2-opd">—<span class="u">μm</span></div><div class="ms">(n−1)·l</div></div>
      <div class="mc green"><div class="ml">縞シフト量</div><div class="mv" id="m2-shift">—<span class="u">λ</span></div><div class="ms">Δ / λ</div></div>
      <div class="mc red"><div class="ml">縞の移動方向</div><div class="mv" id="m2-dir" style="font-size:14px">—</div><div class="ms" id="m2-dir-sub"></div></div>
    </div>

    <!-- 光路図 + 干渉縞 -->
    <div class="vis-area">
      <!-- 光路図 -->
      <div class="path-card">
        <div class="card-hdr">🔦 光路図</div>
        <div class="path-body">
          <div class="cw" style="flex:1;">
            <canvas id="c2-path"></canvas>
            <div class="clabel">Optical path</div>
          </div>
        </div>
      </div>

      <!-- 干渉縞 -->
      <div class="fringe-panel">
        <div class="card-hdr">🌈 干渉縞</div>
        <div class="fringe-body">
          <div class="fringe-unit">
            <div class="flabel">ガラスあり</div>
            <div class="cw" style="width:128px;min-width:128px;"><canvas id="c2-fringe" style="width:128px;min-width:128px;"></canvas></div>
          </div>
          <div class="fringe-unit">
            <div class="flabel">ガラスなし</div>
            <div class="cw" style="width:128px;min-width:128px;"><canvas id="c2-fringe-ref" style="width:128px;min-width:128px;"></canvas></div>
          </div>
          <div class="fringe-unit">
            <div class="flabel">強度</div>
            <div class="cw" style="width:80px;min-width:80px;"><canvas id="c2-intensity" style="width:80px;min-width:80px;"></canvas></div>
          </div>
          <div class="axis-side">
            <span>上</span>
            <span class="mid">← 位置 →</span>
            <span>O</span>
            <span class="mid">← 位置 →</span>
            <span>下</span>
          </div>
        </div>
      </div>
    </div>

    <!-- パラメータ -->
    <div class="params-strip">
      <div class="sliders-row">
        <div class="sg">
          <div class="sg-label"><span class="sg-name"><em>λ</em> 波長</span><span class="sg-val" id="v2-lam">550 nm</span></div>
          <input type="range" id="r2-lam" min="380" max="780" value="550" step="5" oninput="update2()">
        </div>
        <div class="sg">
          <div class="sg-label"><span class="sg-name"><em>2d</em> スリット間隔</span><span class="sg-val" id="v2-d">0.50 mm</span></div>
          <input type="range" id="r2-d" min="0.2" max="2.0" value="0.5" step="0.05" oninput="update2()">
        </div>
        <div class="sg">
          <div class="sg-label"><span class="sg-name"><em>L</em> スクリーン距離</span><span class="sg-val" id="v2-L">1.00 m</span></div>
          <input type="range" id="r2-L" min="0.5" max="3.0" value="1.0" step="0.05" oninput="update2()">
        </div>
        <div class="sg">
          <div class="sg-label"><span class="sg-name"><em>n</em> 屈折率</span><span class="sg-val" id="v2-n">1.50</span></div>
          <input type="range" id="r2-n" min="1.0" max="2.5" value="1.5" step="0.05" oninput="update2()">
        </div>
        <div class="sg">
          <div class="sg-label"><span class="sg-name"><em>l</em> ガラス厚さ</span><span class="sg-val" id="v2-l">0.0 μm</span></div>
          <input type="range" id="r2-l" min="0" max="20" value="0" step="0.1" oninput="update2()">
        </div>
      </div>
    </div>

  </div>
</div>


<script>
/* ── helpers ── */
function wl2rgb(wl){
  if(wl<380||wl>780)return[0,0,0];
  let r,g,b,a=1;
  if(wl<420)a=(wl-380)/40;
  else if(wl>700)a=1-(wl-700)/80;
  if(wl<440){r=(440-wl)/60;g=0;b=1;}
  else if(wl<490){r=0;g=(wl-440)/50;b=1;}
  else if(wl<510){r=0;g=1;b=(510-wl)/20;}
  else if(wl<580){r=(wl-510)/70;g=1;b=0;}
  else if(wl<645){r=1;g=(645-wl)/65;b=0;}
  else{r=1;g=0;b=0;}
  return[r*a*255|0,g*a*255|0,b*a*255|0];
}
function rs(c,a=1){return`rgba(${c[0]},${c[1]},${c[2]},${a})`;}
function fmt(v,d=2){return v.toFixed(d);}

/* ── canvas auto-sizing ──
   各canvasのサイズをコンテナに合わせてリサイズ */
function fitCanvas(cv){
  const p=cv.parentElement;
  // インラインstyle幅を優先、なければ親のclientWidth
  const styleW=parseInt(cv.style.width)||0;
  const w=styleW||p.clientWidth||64;
  const h=p.clientHeight||200;
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}
}

/* ── toggle ── */


/* ══════════ 問２ ══════════ */
function update2(){
  const lam=+document.getElementById('r2-lam').value;
  const twod=+document.getElementById('r2-d').value;
  const L=+document.getElementById('r2-L').value;
  const n=+document.getElementById('r2-n').value;
  const l=+document.getElementById('r2-l').value;

  document.getElementById('v2-lam').textContent=lam+' nm';
  document.getElementById('v2-d').textContent=twod.toFixed(2)+' mm';
  document.getElementById('v2-L').textContent=L.toFixed(2)+' m';
  document.getElementById('v2-n').textContent=n.toFixed(2);
  document.getElementById('v2-l').textContent=l.toFixed(1)+' μm';

  const d=twod/2,lamM=lam*1e-9,dM=d*1e-3;
  const D=(lamM*L/(2*dM))*1e3;
  const opd=(n-1)*l;
  const sv=opd*1e-6/lamM;

  document.getElementById('m2-D').innerHTML=fmt(D)+'<span class="u">mm</span>';
  document.getElementById('m2-opd').innerHTML=fmt(opd,3)+'<span class="u">μm</span>';
  document.getElementById('m2-shift').innerHTML=fmt(sv,2)+'<span class="u">λ</span>';
  document.getElementById('m2-dir').textContent=l>0?'Q側へ':'—';
  document.getElementById('m2-dir-sub').textContent=l>0?'縞がQ方向にシフト':'ガラスなし';

  drawPath2(lam,d,L,n,l);
  drawFringeV('c2-fringe',lam,d,L,n,l,true);
  drawFringeV('c2-fringe-ref',lam,d,L,1,0,true);
  drawIntV('c2-intensity',lam,d,L,n,l,false,0);
}

function drawPath2(lam,d,L,n,l){
  const cv=document.getElementById('c2-path');
  fitCanvas(cv);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  const slitX=Math.round(W*0.16);
  const scX=W-50;
  const midY=H/2, gap=Math.round(H*0.26);
  const pY=midY-gap,qY=midY+gap;
  const col=wl2rgb(lam);

  // R点の位置：ガラスによる光路差 opd=(n-1)*l を打ち消すスクリーン上の位置
  // x_R = -(n-1)*l*L / (2d)  [m]
  // 画面上のy座標：midY を基準にスケール（最大±H*0.30 に収める）
  const dM=d*1e-3, lM=l*1e-6;
  const opd=(n-1)*lM;                          // 光路差 [m]
  const xR=-(opd*L)/(2*dM);                    // スクリーン上のx座標 [m]（n,l大→負=Q側=下）
  const screenSpan=8e-3;
  const maxShiftPx=Math.round(H*0.10);
  // Q側(下)にシフト → xR<0 → canvasのy軸は下向きなので符号を反転して加算
  const rawShiftPx=Math.round((-xR/screenSpan)*H*0.10);
  const tgtYclamped=Math.max(midY-maxShiftPx, Math.min(midY+maxShiftPx, midY+rawShiftPx));

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let y=0;y<H;y+=18){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // ── ガラス板（Qの手前・左側）──
  const glassW=Math.max(8,Math.min(44,l*2.5));
  const gx2=slitX-14;
  const gx1=gx2-glassW;
  const gy1=qY-18,gy2=qY+18;
  if(l>0){
    ctx.fillStyle='rgba(100,180,255,0.17)';ctx.fillRect(gx1,gy1,gx2-gx1,gy2-gy1);
    ctx.strokeStyle='rgba(100,200,255,0.55)';ctx.lineWidth=1.2;ctx.strokeRect(gx1,gy1,gx2-gx1,gy2-gy1);
    const cx=(gx1+gx2)/2;
    ctx.fillStyle='rgba(130,215,255,0.9)';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('n='+n.toFixed(2),cx,gy1-12);
    ctx.fillText('l='+l.toFixed(1)+'μm',cx,gy1-2);
  }

  // 入射光
  ctx.strokeStyle=rs(col,0.4);ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(0,pY);ctx.lineTo(slitX,pY);ctx.stroke();
  if(l>0){
    ctx.beginPath();ctx.moveTo(0,qY);ctx.lineTo(gx1,qY);ctx.stroke();
    ctx.strokeStyle=rs(col,0.65);
    ctx.beginPath();ctx.moveTo(gx1,qY);ctx.lineTo(gx2,qY);ctx.stroke();
    ctx.strokeStyle=rs(col,0.4);
    ctx.beginPath();ctx.moveTo(gx2,qY);ctx.lineTo(slitX,qY);ctx.stroke();
  }else{
    ctx.beginPath();ctx.moveTo(0,qY);ctx.lineTo(slitX,qY);ctx.stroke();
  }
  ctx.setLineDash([]);

  // スリット板
  ctx.fillStyle='rgba(80,120,200,0.12)';ctx.fillRect(slitX-4,0,8,H);
  ctx.strokeStyle='rgba(80,120,200,0.45)';ctx.lineWidth=1;ctx.strokeRect(slitX-4,0,8,H);

  // 出射光
  ctx.strokeStyle=rs(col,0.9);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(slitX,pY);ctx.lineTo(scX,tgtYclamped);ctx.stroke();
  ctx.strokeStyle=rs(col,0.7);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(slitX,qY);ctx.lineTo(scX,tgtYclamped);ctx.stroke();

  // スクリーン
  ctx.fillStyle='rgba(200,200,220,0.06)';ctx.fillRect(scX-3,0,6,H);
  ctx.strokeStyle='rgba(200,200,220,0.25)';ctx.lineWidth=1;ctx.strokeRect(scX-3,0,6,H);

  // 明点
  const g=ctx.createRadialGradient(scX,tgtYclamped,0,scX,tgtYclamped,14);
  g.addColorStop(0,rs(col,0.9));g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(scX,tgtYclamped,14,0,Math.PI*2);ctx.fill();

  // O点マーカー（スクリーン中心）
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(scX-3,midY);ctx.lineTo(scX+12,midY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('O',scX+6,midY+4);

  // ラベル
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 12px sans-serif';ctx.textAlign='right';
  ctx.fillText('P',slitX-8,pY+5);ctx.fillText('Q',slitX-8,qY+5);
  ctx.textAlign='left';ctx.fillText('R',scX+8,tgtYclamped+5);
  ctx.fillStyle='rgba(100,140,255,0.5)';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('スリット板',slitX,H-5);ctx.fillText('スクリーン',scX,H-5);
  // 2d brace
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(slitX-24,pY);ctx.lineTo(slitX-24,qY);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px monospace';ctx.textAlign='right';
  ctx.fillText('2d',slitX-27,midY+4);
  // L arrow
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font='10px monospace';ctx.textAlign='center';
  ctx.fillText('←── L='+L.toFixed(2)+'m ──→',(slitX+scX)/2,H-5);
}

/* 縦縞描画 */
function drawFringeV(id,lam,d,L,n,l,showCenter){
  const cv=document.getElementById(id);
  fitCanvas(cv);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const lamM=lam*1e-9,dM=d*1e-3,lM=(l||0)*1e-6;
  const span=8e-3,opd=(n-1)*lM;
  const col=wl2rgb(lam);

  // 縞パターン描画
  // py大=下=Q側。ガラス(opd>0)によりQ側(下)に縞がシフトするよう符号設定
  const img=ctx.createImageData(W,H);
  for(let py=0;py<H;py++){
    const x=(py/H-0.5)*span;
    const phi=2*Math.PI*(2*dM*x/L-opd)/lamM;  // opdを引く→下シフト
    const I=Math.cos(phi/2)**2;
    for(let px=0;px<W;px++){
      const i=(py*W+px)*4;
      img.data[i]=col[0]*I;img.data[i+1]=col[1]*I;img.data[i+2]=col[2]*I;img.data[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);

  const D=lamM*L/(2*dM)*1000, spanMM=span*1000;
  // 中心明線（m=0）：2d*x/L - opd = 0 → x = opd*L/(2d) > 0 → py > H/2 → 下
  const centerXmm = opd*1e3*L/(2*dM);
  const brightCenterPy = (centerXmm/spanMM+0.5)*H;  // H/2より大＝下
  const shiftMM = centerXmm;                         // 正=下=Q側

  // 各明線マーカー
  for(let m=-8;m<=8;m++){
    const xmm = m*D + centerXmm;
    const py = (xmm/spanMM+0.5)*H;
    if(py>1&&py<H-1){
      ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(W,py);ctx.stroke();
    }
  }

  // O（スクリーン中心）破線
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
  ctx.fillText('O',3,H/2-3);

  // 中心明線（m=0）強調
  if(showCenter){
    const cy=brightCenterPy;
    const inView=(cy>2&&cy<H-2);
    const clampY=Math.max(8,Math.min(H-8,cy));

    // 中心明線ライン（画面内のときのみ）
    if(inView){
      ctx.strokeStyle=rs(col,1.0);ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
    }

    // 左端の三角マーカー（画面外でもクランプして示す）
    ctx.fillStyle=rs(col,inView?1.0:0.7);
    ctx.beginPath();
    ctx.moveTo(0,clampY);ctx.lineTo(8,clampY-5);ctx.lineTo(8,clampY+5);
    ctx.closePath();ctx.fill();

    // ラベル行1：「● 中心明線」
    ctx.font='bold 9px monospace';ctx.textAlign='left';
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.fillText('● 中心明線',10,clampY-4);

    // ラベル行2：Oからの距離（符号付きmm）
    const sign=shiftMM>=0?'+':'';
    const distLabel=sign+shiftMM.toFixed(2)+' mm';
    ctx.font='9px monospace';
    ctx.fillStyle=rs(col,1.0);
    // ラベルの縦位置：clampYの下に出す（上端近くなら上に）
    const ly=(clampY<H-18)?clampY+10:clampY-13;
    ctx.fillText(distLabel,10,ly);
  }
}

/* 縦強度プロファイル */
function drawIntV(id,lam,d,L,n,l,show2nd,lam2,n2,l2){
  const cv=document.getElementById(id);
  fitCanvas(cv);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#050810';ctx.fillRect(0,0,W,H);
  const lamM=lam*1e-9,dM=d*1e-3,opd=(n-1)*(l||0)*1e-6;
  const span=8e-3,col=wl2rgb(lam);
  const spanMM=span*1000,D=lamM*L/(2*dM)*1000;
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  [W*0.25,W*0.5,W*0.75].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  // メイン曲線（λ）
  ctx.strokeStyle=rs(col,0.9);ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let py=0;py<H;py++){
    const x=(py/H-0.5)*span;
    const I=Math.cos(Math.PI*(2*dM*x/L-opd)/lamM)**2;
    py===0?ctx.moveTo(3+I*(W-6),py):ctx.lineTo(3+I*(W-6),py);
  }ctx.stroke();
  // 中心明線マーカー（λ）：opd>0→下→py>H/2
  const cy1=H/2+(opd*1e3*L/(2*dM))/spanMM*H;
  if(cy1>0&&cy1<H){
    ctx.strokeStyle=rs(col,0.8);ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(0,cy1);ctx.lineTo(W,cy1);ctx.stroke();ctx.setLineDash([]);
  }
  // 2nd曲線（λ+Δλ）
  if(show2nd&&lam2){
    const lam2M=lam2*1e-9,col2=wl2rgb(lam2);
    const opd2=(n2-1)*(l2||0)*1e-6;
    ctx.strokeStyle=rs(col2,0.7);ctx.lineWidth=1.2;ctx.setLineDash([4,3]);
    ctx.beginPath();
    for(let py=0;py<H;py++){
      const x=(py/H-0.5)*span;
      const I=Math.cos(Math.PI*(2*dM*x/L-opd2)/lam2M)**2;
      py===0?ctx.moveTo(3+I*(W-6),py):ctx.lineTo(3+I*(W-6),py);
    }ctx.stroke();ctx.setLineDash([]);
    // 中心明線マーカー（λ+Δλ）
    const cy2=H/2+(opd2*1e3*L/(2*dM))/spanMM*H;
    if(cy2>0&&cy2<H){
      ctx.strokeStyle=rs(col2,0.75);ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(0,cy2);ctx.lineTo(W,cy2);ctx.stroke();ctx.setLineDash([]);
    }
  }
  // O ラベル
  ctx.fillStyle='rgba(255,255,255,0.28)';ctx.font='9px monospace';ctx.textAlign='right';
  ctx.fillText('O',W-2,H/2-2);
}
